name: Clojure CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write          # required to push the devcontainer image to GHCR

    steps:
    - name: Checkout (GitHub)
      uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ secrets.AOC_INPUTS_TOKEN }}
        fetch-depth: 0            # poly needs history to find stable-main

    # Only log in on push events (where GITHUB_TOKEN has packages:write).
    # PR builds can still pull from cacheFrom anonymously once the GHCR
    # package is made public (one-time setting in the package UI).
    - name: Log in to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Cache the Maven repo on the host. The devcontainers/ci action mounts
    # the host workspace into the container, but ~/.m2 lives inside the
    # container's home dir, so we stage it under the workspace and bind it
    # in via the `env` + a small symlink dance below.
    - name: Cache Maven repo
      uses: actions/cache@v4
      with:
        path: .m2-cache
        key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Build and run Dev Container tasks
      uses: devcontainers/ci@v0.3
      with:
        imageName: ghcr.io/${{ github.repository_owner }}/aoc-clj-devcontainer
        cacheFrom: ghcr.io/${{ github.repository_owner }}/aoc-clj-devcontainer
        push: filter
        refFilterForPush: refs/heads/main
        env: |
          CLJ_CACHE_DIR=/workspaces/aoc-clj/.m2-cache
          JAVA_TOOL_OPTIONS=-Xss16m
        runCmd: |
          # The host-mounted workspace has a UID mismatch inside the devcontainer,
          # which triggers git's "dubious ownership" safety check. Without this,
          # every git command (including poly's internal workspace analysis)
          # fails silently and poly reports 0 tests.
          git config --global --add safe.directory "$PWD"
          # Point Maven at the workspace-mounted cache so actions/cache can
          # persist it across runs.
          mkdir -p "$CLJ_CACHE_DIR"
          ln -sfn "$CLJ_CACHE_DIR" "$HOME/.m2"
          # Resolve deps (populates ~/.m2 cache)
          clojure -P
          # with:default excludes ^:slow tests, matching pre-migration :test-selectors.
          # Incremental mode (:project) requires the stable-main tag as a reference
          # point. Until the tag-stable workflow creates it (after the first green
          # main build), fall back to a full :all-bricks sweep.
          if git rev-parse --verify --quiet refs/tags/stable-main >/dev/null; then
            echo "stable-main tag found — running incremental tests"
            clojure -M:poly test :project with:default
          else
            echo "no stable-main tag — running full brick sweep"
            clojure -M:poly test :all-bricks with:default
          fi
