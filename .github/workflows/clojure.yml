name: Clojure CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout (GitHub)
      uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ secrets.AOC_INPUTS_TOKEN }}
        fetch-depth: 0            # poly needs history to find stable-main

    - name: Build and run Dev Container tasks
      uses: devcontainers/ci@v0.3
      with:
        runCmd: |
          # Resolve deps (populates ~/.m2 cache)
          clojure -P
          # with:default excludes ^:slow tests, matching pre-migration :test-selectors.
          # Incremental mode (:project) requires the stable-main tag as a reference
          # point. Until the tag-stable workflow creates it (after the first green
          # main build), fall back to a full :all-bricks sweep. On PR merge commits
          # especially, poly without a tag finds no changed bricks and exits with
          # zero tests — so don't rely on its implicit fallback.
          if git rev-parse --verify --quiet refs/tags/stable-main >/dev/null; then
            echo "stable-main tag found — running incremental tests"
            clojure -M:poly test :project with:default
          else
            echo "no stable-main tag — running full brick sweep"
            clojure -M:poly test :all-bricks with:default
          fi
