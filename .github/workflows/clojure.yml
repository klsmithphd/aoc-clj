name: Clojure CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout (GitHub)
      uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ secrets.AOC_INPUTS_TOKEN }}
        fetch-depth: 0            # poly needs history to find stable-main

    - name: Build and run Dev Container tasks
      uses: devcontainers/ci@v0.3
      with:
        runCmd: |
          # Resolve deps (populates ~/.m2 cache)
          clojure -P
          # Incremental test — affected bricks + changed projects, since stable-main.
          # First run (no tag yet) falls back to full sweep.
          # with:default excludes ^:slow tests, matching pre-migration :test-selectors.
          clojure -M:poly test :project with:default
